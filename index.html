<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Dashboard | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="terminal-header">
        <div class="status-bar">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <span class="system-path">root@local:~ /portfolio</span>
        </div>
        <h1>Olá, eu sou <span id="typing-text"></span></h1>
    </header>

    <main class="grid-container">
        <section class="card">
            <h3>Arquitetura</h3>
            <p>Especialista em Docker, Nginx e automação de ambientes locais.</p>
        </section>
        <section class="card">
            <h3>Front-end</h3>
            <p>UI responsiva com HTML5, CSS3 avançado e JS interativo.</p>
        </section>
        <section class="card">
            <h3>Projetos</h3>
            <p>Gestão de serviços e migração de infraestrutura (Firebase > Local).</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
